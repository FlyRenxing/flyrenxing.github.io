name: Build and Deploy

on:
  repository_dispatch:
    types: [content-update]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine
        uses: actions/checkout@v4

      - name: Checkout Content
        uses: actions/checkout@v4
        with:
          repository: FlyRenxing/content-repo
          path: content-repo
          token: ${{ secrets.CONTENT_REPO_TOKEN }}

      - name: Sync Content
        run: |
          # 同步文章
          mkdir -p content/posts
          cp -r content-repo/content/posts/* content/posts/ 2>/dev/null || true
          # 同步图片到 public
          mkdir -p public/images
          cp -r content-repo/content/images/* public/images/ 2>/dev/null || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run AI Pre-process
        run: node scripts/pre-build.js
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Build Astro
        run: npm run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4